# Publish to PyPI using Trusted Publisher when a GitHub release is created.
# Requires Trusted Publisher configured at:
# https://pypi.org/manage/project/sqlalchemy-cubrid/settings/publishing/

name: Upload Python Package

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'publish' to confirm"
        required: true
        type: string

permissions:
  contents: read
  id-token: write  # Required for Trusted Publisher (OIDC)

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: pypi

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build
    - name: Build package
      run: python -m build
    - name: Publish package
      uses: pypa/gh-action-pypi-publish@release/v1
