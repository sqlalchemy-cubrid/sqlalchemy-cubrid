site_name: sqlalchemy-cubrid
site_description: SQLAlchemy 2.0 dialect for the CUBRID database
site_author: cubrid-lab
site_url: https://cubrid-lab.github.io/sqlalchemy-cubrid/
repo_url: https://github.com/cubrid-lab/sqlalchemy-cubrid
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - search.highlight
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

nav:
  - Home: index.md
  - Getting Started:
      - Quick Start: QUICKSTART.md
      - Connection Guide: CONNECTION.md
      - Driver Compatibility: DRIVER_COMPAT.md
  - User Guide:
      - ORM Cookbook: ORM_COOKBOOK.md
      - DML Extensions: DML_EXTENSIONS.md
      - Type Mapping: TYPES.md
      - Isolation Levels: ISOLATION_LEVELS.md
      - Alembic Migrations: ALEMBIC.md
  - Reference:
      - Feature Support: FEATURE_SUPPORT.md
      - Support Matrix: SUPPORT_MATRIX.md
      - Architecture: ARCHITECTURE.md
  - Operations:
      - Performance: PERFORMANCE.md
      - Troubleshooting: TROUBLESHOOTING.md
  - Development:
      - Development Guide: DEVELOPMENT.md
  - Changelog: https://github.com/cubrid-lab/sqlalchemy-cubrid/blob/main/CHANGELOG.md
  - Contributing: https://github.com/cubrid-lab/sqlalchemy-cubrid/blob/main/CONTRIBUTING.md

markdown_extensions:
  - admonition
  - toc:
      permalink: true
      toc_depth: 3
  - tables
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.inlinehilite

plugins:
  - search

validation:
  links:
    not_found: info

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/cubrid-lab/sqlalchemy-cubrid
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/sqlalchemy-cubrid/

extra_javascript:
  - https://unpkg.com/mermaid@11/dist/mermaid.min.js
  - javascripts/mermaid-init.js
